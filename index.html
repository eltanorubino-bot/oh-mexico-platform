// ─── FREEPIK API MODULE ───
const FreepikAPI = {
  baseUrl: "https://blue-violet-5ac5freepik-proxy.eltanorubino.workers.dev/v1",

  async generateImage(apiKey, prompt, options = {}) {
    try {
      const res = await fetch(`${this.baseUrl}/ai/text-to-image`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-freepik-api-key": apiKey },
        body: JSON.stringify({
          prompt,
                image: { size: options.aspect_ratio || "square_1_1" },
        }),
      });
      if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.message || `API Error: ${res.status}`);
             }
             const data = await res.json();
             if (data.data && data.data.length > 0) {
               return {
                 images: data.data.map((img, i) => ({
                   id: Date.now() + i,
                   src: `data:image/jpeg;base64,${img.base64}`,
                   prompt,
                 })),
               };
             }
             return { error: "No images returned" };
    } catch (e) {
      console.warn("Freepik API error:", e.message);
      return { error: e.message };
    }
  },

  async checkTask(apiKey, taskId) {
    try {
      const res = await fetch(`${this.baseUrl}/ai/text-to-image/${taskId}`, {
        headers: { "x-freepik-api-key": apiKey },
      });
      if (!res.ok) throw new Error(`API Error: ${res.status}`);
      return await res.json();
    } catch (e) {
      return { error: e.message };
    }
  },

  async searchResources(apiKey, query, type = "photo") {
    try {
      const res = await fetch(`${this.baseUrl}/resources?query=${encodeURIComponent(query)}&type=${type}&limit=20`, {
        headers: { "x-freepik-api-key": apiKey },
      });
      if (!res.ok) throw new Error(`API Error: ${res.status}`);
      return await res.json();
    } catch (e) {
      return { error: e.message };
    }
  },
};

function MetricCard({ icon: Icon, label, value, change, changeType, color }) {

        <div style={{ background: `${color}15`, borderRadius: 10, padding: 8, display: "flex" }}>
          <Icon size={20} color={color} />

              </div>

              {/* Actions */}
              <div style={{ display: "flex", gap: 8, marginTop: "auto" }}>

                </button>
              </div>
            </div>
          </div>
        </SectionCard>
      )}

      {/* Storage Summary */}
      <div style={{ background: `linear-gradient(135deg, ${COLORS.navy}, #2D3F6A)`, borderRadius: 16, padding: 24, color: COLORS.white }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

            <p style={{ margin: 0, fontSize: 13, opacity: 0.7 }}>{mediaItems.length} archivos • {(mediaItems.reduce((s, m) => s + parseFloat(m.size), 0)).toFixed(1)} MB total</p>

            {Object.entries(catLabels).map(([key, label]) => (
              <div key={key}>

              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

                  <div style={{ fontSize: 13, color: "#6B7280" }}>Avg. Reach</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.olive, marginTop: 4 }}>{t.eng} eng.</div>
                  <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 6, fontStyle: "italic" }}>{t.tip}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* === CALENDAR === */}
        {activeTab === "calendar" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ margin: 0, fontSize: 20, color: COLORS.navy }}>Calendario Editorial</h2>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setCalendarWeek(Math.max(0, calendarWeek - 1))} style={{ background: COLORS.white, border: `1px solid ${COLORS.lightGray}`, borderRadius: 8, padding: 6, cursor: "pointer", display: "flex" }}><ChevronLeft size={18} /></button>
                <span style={{ fontSize: 14, fontWeight: 600, color: COLORS.navy }}>{calendarWeek === 0 ? "Semana Actual" : `Semana +${calendarWeek}`}</span>
                <button onClick={() => setCalendarWeek(Math.min(1, calendarWeek + 1))} style={{ background: COLORS.white, border: `1px solid ${COLORS.lightGray}`, borderRadius: 8, padding: 6, cursor: "pointer", display: "flex" }}><ChevronRight size={18} /></button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              {[{ label: "Idea", color: "#D1D5DB" }, { label: "Borrador", color: "#FCD34D" }, { label: "Aprobado", color: "#86EFAC" }, { label: "Programado", color: "#93C5FD" }, { label: "Publicado", color: "#A78BFA" }].map((s) => (
                <div key={s.label} style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ width: 10, height: 10, borderRadius: 3, background: s.color }} /><span style={{ fontSize: 12, color: "#6B7280" }}>{s.label}</span></div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 12 }}>
              {["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"].map((d) => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#9CA3AF", padding: "0 0 8px" }}>{d}</div>
              ))}
              {calItems.map((item, i) => <CalendarDay key={i} item={item} />)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12 }}>
              {[
                { label: "Ideas", count: CALENDAR_ITEMS.filter(c => c.status === "idea").length, color: "#D1D5DB" },
                { label: "Borradores", count: CALENDAR_ITEMS.filter(c => c.status === "draft").length, color: "#FCD34D" },
                { label: "Aprobados", count: CALENDAR_ITEMS.filter(c => c.status === "approved").length, color: "#86EFAC" },
                { label: "Programados", count: CALENDAR_ITEMS.filter(c => c.status === "scheduled").length, color: "#93C5FD" },
                { label: "Publicados", count: CALENDAR_ITEMS.filter(c => c.status === "published").length, color: "#A78BFA" },
              ].map((s) => (
                <div key={s.label} style={{ background: COLORS.white, borderRadius: 12, padding: 16, textAlign: "center", borderTop: `3px solid ${s.color}`, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.navy }}>{s.count}</div>
                  <div style={{ fontSize: 13, color: "#6B7280" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* === INTELLIGENCE === */}
        {activeTab === "intelligence" && <IntelligenceTab />}

        {/* === POST CREATOR === */}
        {activeTab === "creator" && <PostCreatorTab />}

        {/* === MEDIA LIBRARY === */}
        {activeTab === "media" && <MediaLibraryTab />}

        {/* === LOCATIONS === */}
        {activeTab === "locations" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <h2 style={{ margin: 0, fontSize: 20, color: COLORS.navy }}>Performance por Locación</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {LOCATIONS_DATA.map((loc) => (
                <SectionCard key={loc.name}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                    <MapPin size={18} color={COLORS.terracotta} />
                    <h3 style={{ margin: 0, fontSize: 18, color: COLORS.navy }}>{loc.name}</h3>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
                    <div><div style={{ fontSize: 24, fontWeight: 700, color: COLORS.navy }}>{loc.rating}</div><div style={{ fontSize: 12, color: "#9CA3AF" }}>Rating</div></div>
                    <div><div style={{ fontSize: 24, fontWeight: 700, color: COLORS.terracotta }}>{loc.reviews.toLocaleString()}</div><div style={{ fontSize: 12, color: "#9CA3AF" }}>Reviews</div></div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, color: "#6B7280" }}>Top Dish</span><span style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>{loc.topDish}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, color: "#6B7280" }}>Margaritas/día</span><span style={{ fontSize: 13, fontWeight: 600, color: COLORS.terracotta }}>~{loc.dailyMargaritas}</span></div>
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 13, color: "#6B7280" }}>Sentiment</span><span style={{ fontSize: 13, fontWeight: 600, color: loc.sentiment > 85 ? COLORS.positive : COLORS.mustard }}>{loc.sentiment}%</span></div>
                      <div style={{ height: 6, background: COLORS.lightGray, borderRadius: 3 }}><div style={{ height: "100%", width: `${loc.sentiment}%`, background: loc.sentiment > 85 ? COLORS.positive : COLORS.mustard, borderRadius: 3 }} /></div>
                    </div>
                  </div>
                </SectionCard>
              ))}
            </div>
            <div style={{ background: `linear-gradient(135deg, ${COLORS.terracotta}, ${COLORS.accent1})`, borderRadius: 16, padding: 32, color: COLORS.white, textAlign: "center" }}>
              <div style={{ fontSize: 14, opacity: 0.8, marginBottom: 8 }}>Margaritas vendidas este año (estimado)</div>
              <div style={{ fontSize: 48, fontWeight: 800, letterSpacing: -2 }}>~{(150 * 90).toLocaleString()}</div>
              <div style={{ fontSize: 14, opacity: 0.8, marginTop: 8 }}>~150 diarias x 3 locaciones = contenido infinito</div>
            </div>
          </div>
        )}
      </div>

      {/* ─── FOOTER ─── */}
      <div style={{ padding: "20px 32px", textAlign: "center", borderTop: `1px solid ${COLORS.lightGray}`, marginTop: 40 }}>
        <p style={{ margin: 0, fontSize: 12, color: "#9CA3AF" }}>
          Oh! Mexico Platform • Brand Management Suite • Built by La Productora • Mar 2026
        </p>
      </div>

      <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(OhMexicoPlatform));
</script>
</body>
</html>
